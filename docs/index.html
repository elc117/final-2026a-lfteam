<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jiu-Jitsu Manager</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#1f2937;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

button{
    margin:5px;
    padding:10px 15px;
    background:#2563eb;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th, td{
    border:1px solid #ddd;
    padding:8px;
    text-align:center;
}

th{
    background:#2563eb;
    color:white;
}
</style>
</head>

<body>

<header>
    <h1>🥋 Jiu-Jitsu Manager</h1>
</header>

<div class="container">

    <h3>Selecione uma entidade:</h3>

    <button onclick="carregar('atletas')">Atletas</button>
    <button onclick="carregar('professores')">Professores</button>
    <button onclick="carregar('equipes')">Equipes</button>
    <button onclick="carregar('graduacoes')">Graduações</button>
    <button onclick="carregar('treinos')">Treinos</button>

    <table id="tabela"></table>

</div>

<script>

// ✅ Troque pela URL do Render após o deploy do backend
// Exemplo: "https://jiujitsu-manager.onrender.com"
// Para rodar localmente, deixe como "http://localhost:7070"
const API_BASE = "https://SEU-PROJETO.onrender.com";

async function carregar(tipo){

    const resposta = await fetch(`${API_BASE}/${tipo}`);
    const dados = await resposta.json();

    let html = "";

    if(dados.length > 0){

        html += "<tr>";

        for(let chave in dados[0]){
            html += `<th>${chave}</th>`;
        }

        html += "</tr>";

        dados.forEach(item => {

            html += "<tr>";

            for(let chave in item){
                html += `<td>${item[chave]}</td>`;
            }

            html += "</tr>";
        });
    }

    document.getElementById("tabela").innerHTML = html;
}

</script>

</body>
</html>
